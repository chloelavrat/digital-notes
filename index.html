<!doctype html>
<html lang="en" data-theme="light">

    <!-- Apply theme before first paint: cookie → system preference → light -->
    <script>try{var m=document.cookie.match(/(?:^|; )dn-theme=([^;]*)/);var t=m?decodeURIComponent(m[1]):(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t)}catch(e){}</script>
